<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Mailer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200">
            <div class="max-w-6xl mx-auto px-4 py-4">
                <h1 class="text-2xl font-bold text-gray-900">📧 Infinity Mailer</h1>
                <p class="text-gray-600 text-sm mt-1">Gestión de campañas de email para Infinity Box</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-4 py-8">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 gap-4 mb-6">
                <button id="tab-campaigns" class="tab-button active px-4 py-2 border-b-2 border-blue-600 text-blue-600 font-medium">
                    Campañas
                </button>
                <button id="tab-nueva" class="tab-button px-4 py-2 border-b-2 border-transparent text-gray-600 font-medium hover:text-gray-900">
                    Nueva Campaña
                </button>
                <button id="tab-estadisticas" class="tab-button px-4 py-2 border-b-2 border-transparent text-gray-600 font-medium hover:text-gray-900">
                    Estadísticas
                </button>
            </div>

            <!-- Tab: Campañas -->
            <div id="content-campaigns" class="tab-content">
                <div class="space-y-4">
                    <div id="campaigns-loading" class="text-center py-12">
                        <p class="text-gray-500">Cargando campañas...</p>
                    </div>
                    <div id="campaigns-list" class="hidden space-y-4"></div>
                    <div id="campaigns-empty" class="hidden text-center py-12">
                        <p class="text-gray-500">No hay campañas aún</p>
                    </div>
                </div>
            </div>

            <!-- Tab: Nueva Campaña -->
            <div id="content-nueva" class="tab-content hidden">
                <div class="bg-white rounded-lg shadow p-6 max-w-2xl">
                    <h2 class="text-xl font-bold mb-4">Crear Nueva Campaña</h2>
                    <form id="new-campaign-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la Campaña</label>
                            <input type="text" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Asunto</label>
                            <input type="text" name="subject" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Cuerpo del Email</label>
                            <textarea name="body" rows="6" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Destinatarios (uno por línea o CSV)</label>
                            <textarea name="recipients" rows="4" required placeholder="email1@example.com&#10;email2@example.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 font-mono text-sm"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition">
                            Crear Campaña
                        </button>
                    </form>
                </div>
            </div>

            <!-- Tab: Estadísticas -->
            <div id="content-estadisticas" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-600 text-sm font-medium">Total Campañas</div>
                        <div id="stat-total" class="text-3xl font-bold text-gray-900 mt-2">0</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-600 text-sm font-medium">Enviadas</div>
                        <div id="stat-sent" class="text-3xl font-bold text-green-600 mt-2">0</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-600 text-sm font-medium">Pendientes</div>
                        <div id="stat-pending" class="text-3xl font-bold text-yellow-600 mt-2">0</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-600 text-sm font-medium">Rebotes</div>
                        <div id="stat-bounced" class="text-3xl font-bold text-red-600 mt-2">0</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200 mt-12 py-6">
            <div class="max-w-6xl mx-auto px-4 text-center text-gray-500 text-sm">
                <p>Infinity Mailer v1.0 — Sistema de gestión de campañas de email</p>
            </div>
        </footer>
    </div>

    <script>
        // ========== TAB SWITCHING ==========
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.id.replace('tab-', '');

                // Update active button
                document.querySelectorAll('.tab-button').forEach(b => {
                    b.classList.remove('active', 'border-blue-600', 'text-blue-600');
                    b.classList.add('border-transparent', 'text-gray-600');
                });
                this.classList.add('active', 'border-blue-600', 'text-blue-600');
                this.classList.remove('border-transparent', 'text-gray-600');

                // Show/hide content
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.add('hidden');
                });
                document.getElementById(`content-${tabName}`).classList.remove('hidden');
            });
        });

        // ========== DATA ==========
        const mockCampaigns = [
            {
                id: 1,
                name: 'Campaña Test Marzo',
                subject: 'Nuevas Cajas de Cartón - Oferta Especial',
                status: 'sent',
                recipients: 150,
                sent: 145,
                bounced: 5,
                created_at: '2026-03-25',
                scheduled_for: '2026-03-26'
            },
            {
                id: 2,
                name: 'Follow-up Clientes',
                subject: '¿Te interesa conocer nuestras soluciones?',
                status: 'pending',
                recipients: 80,
                sent: 0,
                bounced: 0,
                created_at: '2026-03-28',
                scheduled_for: '2026-03-31'
            }
        ];

        // ========== LOAD CAMPAIGNS ==========
        function loadCampaigns() {
            const list = document.getElementById('campaigns-list');
            const loading = document.getElementById('campaigns-loading');
            const empty = document.getElementById('campaigns-empty');

            // Simulate network delay
            setTimeout(function() {
                loading.classList.add('hidden');

                if (mockCampaigns.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                list.classList.remove('hidden');
                list.innerHTML = mockCampaigns.map(campaign => `
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="text-lg font-bold text-gray-900">${campaign.name}</h3>
                                <p class="text-gray-600 text-sm">${campaign.subject}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-sm font-medium ${
                                campaign.status === 'sent' ? 'bg-green-100 text-green-800' :
                                campaign.status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                                'bg-gray-100 text-gray-800'
                            }">
                                ${campaign.status === 'sent' ? 'Enviada' : campaign.status === 'pending' ? 'Pendiente' : 'Borrador'}
                            </span>
                        </div>
                        <div class="grid grid-cols-4 gap-4 text-sm mb-4">
                            <div>
                                <div class="text-gray-600">Destinatarios</div>
                                <div class="text-lg font-bold">${campaign.recipients}</div>
                            </div>
                            <div>
                                <div class="text-gray-600">Enviados</div>
                                <div class="text-lg font-bold text-green-600">${campaign.sent}</div>
                            </div>
                            <div>
                                <div class="text-gray-600">Rebotes</div>
                                <div class="text-lg font-bold text-red-600">${campaign.bounced}</div>
                            </div>
                            <div>
                                <div class="text-gray-600">Programada</div>
                                <div class="text-sm font-mono">${campaign.scheduled_for}</div>
                            </div>
                        </div>
                        <button class="text-blue-600 hover:text-blue-700 text-sm font-medium">Ver detalles →</button>
                    </div>
                `).join('');
            }, 300);
        }

        // ========== LOAD STATS ==========
        function loadStats() {
            const totalCampaigns = mockCampaigns.length;
            const sentCampaigns = mockCampaigns.filter(c => c.status === 'sent').length;
            const pendingCampaigns = mockCampaigns.filter(c => c.status === 'pending').length;
            const totalBounced = mockCampaigns.reduce((sum, c) => sum + c.bounced, 0);

            document.getElementById('stat-total').textContent = totalCampaigns;
            document.getElementById('stat-sent').textContent = sentCampaigns;
            document.getElementById('stat-pending').textContent = pendingCampaigns;
            document.getElementById('stat-bounced').textContent = totalBounced;
        }

        // ========== NEW CAMPAIGN FORM ==========
        document.getElementById('new-campaign-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = this.querySelector('input[name="name"]').value;
            const subject = this.querySelector('input[name="subject"]').value;
            const body = this.querySelector('textarea[name="body"]').value;
            const recipients = this.querySelector('textarea[name="recipients"]').value.split('\n').filter(e => e.trim());

            const newCampaign = {
                id: mockCampaigns.length + 1,
                name: name,
                subject: subject,
                status: 'pending',
                recipients: recipients.length,
                sent: 0,
                bounced: 0,
                created_at: new Date().toISOString().split('T')[0],
                scheduled_for: new Date(Date.now() + 86400000).toISOString().split('T')[0]
            };

            mockCampaigns.unshift(newCampaign);

            // Reset form
            this.reset();

            // Show success
            alert('✅ Campaña creada: ' + name);

            // Reload data
            loadCampaigns();
            loadStats();

            // Switch to campaigns tab
            document.getElementById('tab-campaigns').click();
        });

        // ========== INIT ==========
        loadCampaigns();
        loadStats();
    </script>
</body>
</html>
