<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Mailer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root" v-cloak>
    <!-- Header -->
    <div class="bg-white border-b border-gray-200">
      <div class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">📧 Infinity Mailer</h1>
          <p class="text-sm text-gray-500 mt-1">Aprobación de campañas de email</p>
        </div>
        <a href="/" class="text-gray-600 hover:text-gray-900">← Dashboard</a>
      </div>
    </div>

    <!-- Contenido -->
    <div class="max-w-6xl mx-auto px-6 py-8">
      <div id="loading" class="text-center py-12">
        <div class="inline-block">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
          <p class="mt-4 text-gray-600">Cargando campañas...</p>
        </div>
      </div>

      <div id="content" style="display: none;">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Panel izquierdo: Lista de campañas -->
          <div class="bg-white rounded-lg border border-gray-200 shadow-sm">
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-200 font-semibold text-gray-900">
              Campañas (<span id="campaign-count">0</span>)
            </div>
            <div id="campaigns-list" class="divide-y max-h-96 overflow-y-auto">
              <!-- Se llena con JS -->
            </div>
          </div>

          <!-- Panel derecho: Detalles -->
          <div class="lg:col-span-2">
            <div id="no-selection" class="bg-white rounded-lg border border-gray-200 shadow-sm p-8 text-center text-gray-500">
              Selecciona una campaña para ver detalles
            </div>

            <div id="details" style="display: none;" class="bg-white rounded-lg border border-gray-200 shadow-sm p-6">
              <h2 id="detail-name" class="text-2xl font-bold text-gray-900 mb-4"></h2>

              <!-- Stats -->
              <div class="grid grid-cols-4 gap-3 mb-6">
                <div class="text-center bg-gray-50 p-3 rounded">
                  <p class="text-xs text-gray-600">Total</p>
                  <p id="stat-count" class="text-xl font-bold text-gray-900">0</p>
                </div>
                <div class="text-center bg-gray-50 p-3 rounded">
                  <p class="text-xs text-gray-600">Status</p>
                  <p id="stat-status" class="text-sm font-bold"></p>
                </div>
                <div class="text-center bg-gray-50 p-3 rounded">
                  <p class="text-xs text-gray-600">Creado</p>
                  <p id="stat-date" class="text-xs font-bold text-gray-900"></p>
                </div>
                <div class="text-center bg-gray-50 p-3 rounded">
                  <p class="text-xs text-gray-600">Fuente</p>
                  <p id="stat-source" class="text-xs font-bold text-gray-900">Infinity Box</p>
                </div>
              </div>

              <!-- Contenido -->
              <div class="bg-gray-50 p-4 rounded mb-6 space-y-3">
                <div>
                  <p class="text-xs font-semibold text-gray-600 mb-1">📧 Asunto</p>
                  <p id="detail-subject" class="text-sm text-gray-900"></p>
                </div>
                <div>
                  <p class="text-xs font-semibold text-gray-600 mb-1">📝 Mensaje</p>
                  <p id="detail-body" class="text-sm text-gray-700 whitespace-pre-wrap max-h-24 overflow-y-auto"></p>
                </div>
              </div>

              <!-- Botón aprobar -->
              <button id="approve-btn" class="w-full bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg font-semibold mb-6 transition">
                ✅ APROBAR CAMPAÑA
              </button>

              <!-- Destinatarios -->
              <div class="mt-6 pt-6 border-t border-gray-200">
                <h3 class="font-semibold text-gray-900 mb-3">👥 Destinatarios (<span id="recipients-count">0</span>)</h3>
                <div id="recipients-list" class="max-h-48 overflow-y-auto space-y-1"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="error" style="display: none;" class="bg-red-50 border border-red-200 rounded-lg p-6 text-center text-red-800">
        <p id="error-text">Error cargando campañas</p>
        <button onclick="location.reload()" class="mt-4 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">
          Reintentar
        </button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://lirzzskabepwdlhvdmla.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpcnp6c2thYmVwd2RsaHZkbWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDExMjcsImV4cCI6MjA4Nzg3NzEyN30.RDl7rokWNnW5nrPDFVndHwWd9rNv8Wr42M4V6SJbgKw';

    let campaigns = [];
    let selectedCampaign = null;

    // Cargar campañas
    function loadCampaigns() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      fetch(`${SUPABASE_URL}/rest/v1/email_campaigns?select=*&order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      })
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => {
          campaigns = data;
          renderCampaigns();
          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'block';
        })
        .catch(err => {
          console.error('Error:', err);
          document.getElementById('error-text').textContent = err.message;
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
        });
    }

    // Renderizar lista de campañas
    function renderCampaigns() {
      const list = document.getElementById('campaigns-list');
      document.getElementById('campaign-count').textContent = campaigns.length;

      list.innerHTML = campaigns.map(c => `
        <button
          onclick="selectCampaign('${c.id}')"
          class="w-full text-left p-4 hover:bg-gray-50 transition ${selectedCampaign?.id === c.id ? 'bg-blue-50 border-l-4 border-blue-600' : ''}"
        >
          <div class="font-semibold text-sm text-gray-900">${c.name}</div>
          <div class="text-xs text-gray-500 mt-1">
            Status: <span class="font-bold ${c.status === 'draft' ? 'text-yellow-600' : 'text-green-600'}">${c.status.toUpperCase()}</span>
          </div>
          <div class="text-xs text-gray-500">Contactos: ${c.recipient_count || 0}</div>
        </button>
      `).join('');
    }

    // Seleccionar campaña
    function selectCampaign(id) {
      selectedCampaign = campaigns.find(c => c.id === id);
      if (!selectedCampaign) return;

      // Actualizar UI
      document.getElementById('no-selection').style.display = 'none';
      document.getElementById('details').style.display = 'block';

      document.getElementById('detail-name').textContent = selectedCampaign.name;
      document.getElementById('detail-subject').textContent = selectedCampaign.subject || 'Sin asunto';
      document.getElementById('detail-body').textContent = selectedCampaign.body || 'Sin contenido';
      document.getElementById('stat-count').textContent = selectedCampaign.recipient_count || 0;
      document.getElementById('stat-date').textContent = new Date(selectedCampaign.created_at).toLocaleDateString('es-CL');

      const statusEl = document.getElementById('stat-status');
      statusEl.textContent = selectedCampaign.status.toUpperCase();
      statusEl.className = selectedCampaign.status === 'draft' ? 'text-sm font-bold text-yellow-600' : 'text-sm font-bold text-green-600';

      const approveBtn = document.getElementById('approve-btn');
      if (selectedCampaign.status === 'approved') {
        approveBtn.textContent = '✅ YA APROBADA';
        approveBtn.disabled = true;
        approveBtn.className = 'w-full bg-gray-400 text-white px-4 py-3 rounded-lg font-semibold mb-6 cursor-not-allowed';
      } else {
        approveBtn.textContent = '✅ APROBAR CAMPAÑA';
        approveBtn.disabled = false;
        approveBtn.className = 'w-full bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg font-semibold mb-6 transition';
        approveBtn.onclick = () => approveCampaign(id);
      }

      // Cargar destinatarios
      loadRecipients(id);

      // Re-renderizar para actualizar highlight
      renderCampaigns();
    }

    // Cargar destinatarios
    function loadRecipients(campaignId) {
      fetch(`${SUPABASE_URL}/rest/v1/email_recipients?campaign_id=eq.${campaignId}&select=*`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      })
        .then(res => res.json())
        .then(data => {
          document.getElementById('recipients-count').textContent = data.length;
          const list = document.getElementById('recipients-list');
          list.innerHTML = data.slice(0, 20).map(r => `
            <div class="text-sm bg-gray-50 p-2 rounded flex justify-between items-center">
              <span class="font-mono text-xs">${r.email}</span>
              <span class="text-xs text-gray-500 px-2 py-1 bg-white rounded">${r.status}</span>
            </div>
          `).join('');
          if (data.length > 20) {
            list.innerHTML += `<p class="text-xs text-gray-500 p-2">... y ${data.length - 20} más</p>`;
          }
        })
        .catch(err => console.error('Error cargando destinatarios:', err));
    }

    // Aprobar campaña
    function approveCampaign(id) {
      if (!confirm('¿Confirmar aprobación de campaña?')) return;

      fetch(`${SUPABASE_URL}/rest/v1/email_campaigns?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          status: 'approved',
          approved_at: new Date().toISOString()
        })
      })
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          alert('✅ Campaña aprobada correctamente');
          loadCampaigns();
        })
        .catch(err => {
          console.error('Error:', err);
          alert('❌ Error al aprobar: ' + err.message);
        });
    }

    // Iniciar
    loadCampaigns();
    setInterval(loadCampaigns, 30000); // Recargar cada 30s
  </script>
</body>
</html>
