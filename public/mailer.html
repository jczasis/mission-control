<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Mailer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <script>
    // Configuración
    const SUPABASE_URL = 'https://lirzzskabepwdlhvdmla.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpcnp6c2thYmVwd2RsaHZkbWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDExMjcsImV4cCI6MjA4Nzg3NzEyN30.RDl7rokWNnW5nrPDFVndHwWd9rNv8Wr42M4V6SJbgKw';

    let supabase;
    let state = {
      campaigns: [],
      selectedCampaign: null,
      activeTab: 'campaigns',
      loading: true,
      recipients: []
    };

    // Inicializar Supabase cuando esté listo
    function initSupabase() {
      if (window.supabase && window.supabase.createClient) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        loadCampaigns();
      } else {
        setTimeout(initSupabase, 100);
      }
    }

    // Cargar campañas desde Supabase
    function loadCampaigns() {
      state.loading = true;
      render();

      supabase
        .from('email_campaigns')
        .select('*')
        .order('created_at', { ascending: false })
        .then(({ data, error }) => {
          if (error) {
            console.error('Error:', error);
          } else {
            state.campaigns = data || [];
          }
          state.loading = false;
          render();
        })
        .catch(err => {
          console.error('Error:', err);
          state.loading = false;
          render();
        });
    }

    // Aprobar campaña
    function approveCampaign(campaignId) {
      if (!confirm('¿Aprobar esta campaña?')) return;

      supabase
        .from('email_campaigns')
        .update({
          status: 'approved',
          approved_by: 'usuario',
          approved_at: new Date().toISOString()
        })
        .eq('id', campaignId)
        .then(({ error }) => {
          if (error) {
            alert(`❌ Error: ${error.message}`);
          } else {
            alert('✅ Campaña aprobada');
            loadCampaigns();
          }
        });
    }

    // Seleccionar campaña
    function selectCampaign(campaignId) {
      const campaign = state.campaigns.find(c => c.id === campaignId);
      if (!campaign) return;

      state.selectedCampaign = campaign;

      supabase
        .from('email_recipients')
        .select('*')
        .eq('campaign_id', campaignId)
        .then(({ data, error }) => {
          if (!error) {
            state.recipients = data || [];
          }
          render();
        });
    }

    // Renderizar UI
    function render() {
      const app = document.getElementById('app');

      if (state.loading) {
        app.innerHTML = '<div class="flex items-center justify-center h-screen"><p class="text-gray-600">Cargando...</p></div>';
        return;
      }

      app.innerHTML = `
        <div class="min-h-screen bg-gray-50">
          <!-- Header -->
          <div class="bg-white border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
              <div>
                <h1 class="text-3xl font-bold text-gray-900">📧 Infinity Mailer</h1>
                <p class="text-sm text-gray-500 mt-1">Aprobación de campañas - Datos reales SEIA</p>
              </div>
              <a href="/" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded font-semibold">
                ← Dashboard
              </a>
            </div>
          </div>

          <!-- Contenido -->
          <div class="max-w-7xl mx-auto px-6 py-6">
            ${renderCampaigns()}
          </div>
        </div>
      `;
    }

    function renderCampaigns() {
      if (state.campaigns.length === 0) {
        return '<div class="bg-white rounded border border-gray-200 p-6"><p class="text-gray-600">No hay campañas pendientes</p></div>';
      }

      return `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Lista de campañas -->
          <div class="bg-white rounded border border-gray-200">
            <div class="p-4 bg-gray-50 border-b font-semibold">Campañas (${state.campaigns.length})</div>
            <div class="divide-y max-h-96 overflow-y-auto">
              ${state.campaigns.map(c => `
                <button
                  onclick="selectCampaign('${c.id}')"
                  class="w-full text-left p-3 hover:bg-gray-50 transition ${state.selectedCampaign?.id === c.id ? 'bg-blue-50 border-l-4 border-blue-600' : ''}"
                >
                  <div class="font-semibold text-sm text-gray-900">${c.name}</div>
                  <div class="text-xs text-gray-500 mt-1">Status: <span class="font-bold ${c.status === 'draft' ? 'text-yellow-600' : c.status === 'approved' ? 'text-green-600' : 'text-gray-600'}">${c.status.toUpperCase()}</span></div>
                  <div class="text-xs text-gray-500">Contactos: ${c.recipient_count}</div>
                </button>
              `).join('')}
            </div>
          </div>

          <!-- Detalle de campaña -->
          <div class="lg:col-span-2">
            ${state.selectedCampaign ? `
              <div class="bg-white rounded border border-gray-200 p-6">
                <h2 class="text-2xl font-bold text-gray-900 mb-4">${state.selectedCampaign.name}</h2>

                <!-- Estadísticas -->
                <div class="grid grid-cols-4 gap-4 mb-6">
                  <div class="text-center bg-gray-50 p-4 rounded">
                    <p class="text-xs text-gray-600 mb-1">Total</p>
                    <p class="text-2xl font-bold text-gray-900">${state.selectedCampaign.recipient_count}</p>
                  </div>
                  <div class="text-center bg-gray-50 p-4 rounded">
                    <p class="text-xs text-gray-600 mb-1">Status</p>
                    <p class="text-lg font-bold ${state.selectedCampaign.status === 'draft' ? 'text-yellow-600' : state.selectedCampaign.status === 'approved' ? 'text-green-600' : 'text-blue-600'}">${state.selectedCampaign.status.toUpperCase()}</p>
                  </div>
                  <div class="text-center bg-gray-50 p-4 rounded">
                    <p class="text-xs text-gray-600 mb-1">Creado</p>
                    <p class="text-xs font-bold text-gray-900">${new Date(state.selectedCampaign.created_at).toLocaleDateString('es-CL')}</p>
                  </div>
                  <div class="text-center bg-gray-50 p-4 rounded">
                    <p class="text-xs text-gray-600 mb-1">Fuente</p>
                    <p class="text-xs font-bold text-gray-900">${state.selectedCampaign.is_infinity_box ? '∞ Box' : 'Other'}</p>
                  </div>
                </div>

                <!-- Contenido -->
                <div class="space-y-4 mb-6 bg-gray-50 p-4 rounded">
                  <div>
                    <p class="text-xs font-semibold text-gray-600 mb-1">📧 Asunto</p>
                    <p class="text-sm text-gray-900">${state.selectedCampaign.subject}</p>
                  </div>
                  <div>
                    <p class="text-xs font-semibold text-gray-600 mb-1">📝 Mensaje</p>
                    <p class="text-sm text-gray-700 whitespace-pre-wrap max-h-32 overflow-y-auto">${state.selectedCampaign.body}</p>
                  </div>
                </div>

                <!-- Botón de aprobación -->
                ${state.selectedCampaign.status === 'draft' ? `
                  <button
                    onclick="approveCampaign('${state.selectedCampaign.id}')"
                    class="w-full bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded font-semibold mb-6"
                  >
                    ✅ APROBAR CAMPAÑA
                  </button>
                ` : `
                  <div class="w-full bg-green-100 text-green-800 px-4 py-3 rounded font-semibold mb-6 text-center">
                    ✅ APROBADA
                  </div>
                `}

                <!-- Lista de destinatarios -->
                <div class="mt-6 pt-6 border-t border-gray-200">
                  <h3 class="font-semibold text-gray-900 mb-3">👥 Destinatarios (${state.recipients.length})</h3>
                  <div class="max-h-48 overflow-y-auto space-y-1">
                    ${state.recipients.slice(0, 20).map(r => `
                      <div class="text-sm bg-gray-50 p-2 rounded flex justify-between items-center">
                        <span class="font-mono">${r.email}</span>
                        <span class="text-xs text-gray-500 px-2 py-1 bg-white rounded">${r.status}</span>
                      </div>
                    `).join('')}
                    ${state.recipients.length > 20 ? `<p class="text-xs text-gray-500 p-2">... y ${state.recipients.length - 20} más</p>` : ''}
                  </div>
                </div>
              </div>
            ` : '<div class="bg-white rounded border border-gray-200 p-6 text-center text-gray-600">Selecciona una campaña para ver detalles</div>'}
          </div>
        </div>
      `;
    }

    // Iniciar cuando DOM esté listo
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initSupabase);
    } else {
      initSupabase();
    }

    // Recargar cada 30 segundos
    setInterval(loadCampaigns, 30000);
  </script>
</body>
</html>
