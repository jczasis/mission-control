<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Mailer 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen">
    <div class="bg-white border-b border-gray-200">
      <div class="max-w-6xl mx-auto px-6 py-6">
        <h1 class="text-3xl font-bold text-gray-900">📧 Infinity Mailer v2</h1>
        <p class="text-sm text-gray-500 mt-1">Aprobación de campañas</p>
      </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-8" id="app"></div>
  </div>

  <script>
    const API = 'https://lirzzskabepwdlhvdmla.supabase.co/rest/v1';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpcnp6c2thYmVwd2RsaHZkbWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDExMjcsImV4cCI6MjA4Nzg3NzEyN30.RDl7rokWNnW5nrPDFVndHwWd9rNv8Wr42M4V6SJbgKw';

    let data = { campaigns: [], selected: null };

    function load() {
      document.getElementById('app').innerHTML = '<p>Cargando...</p>';
      fetch(API + '/email_campaigns?order=created_at.desc', {
        headers: { apikey: KEY, Authorization: 'Bearer ' + KEY }
      })
      .then(r => r.json())
      .then(c => { data.campaigns = c; paint(); })
      .catch(e => { document.getElementById('app').innerHTML = '<p style="color:red">Error: ' + e.message + '</p>'; });
    }

    function pick(id) {
      data.selected = data.campaigns.find(c => c.id === id);
      paint();
      fetch(API + '/email_recipients?campaign_id=eq.' + id + '&select=email,status', {
        headers: { apikey: KEY, Authorization: 'Bearer ' + KEY }
      }).then(r => r.json()).then(recipients => {
        let html = '';
        recipients.forEach(r => {
          html += '<div style="font-size:12px; background:#f3f4f6; padding:8px; margin:4px 0; border-radius:4px; display:flex; justify-content:space-between"><span>' + r.email + '</span><span style="color:#999">' + r.status + '</span></div>';
        });
        document.getElementById('recips').innerHTML = html || '<p style="font-size:12px; color:#999">No hay destinatarios</p>';
      });
    }

    function ok(id) {
      if (!confirm('¿Aprobar?')) return;
      fetch(API + '/email_campaigns?id=eq.' + id, {
        method: 'PATCH',
        headers: { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'approved', approved_at: new Date().toISOString() })
      }).then(r => { alert('✅ Aprobada'); load(); }).catch(e => alert('Error: ' + e.message));
    }

    function paint() {
      let html = '<div style="display:grid; grid-template-columns:1fr 2fr; gap:24px">';
      html += '<div style="background:white; border:1px solid #e5e7eb; border-radius:8px; padding:16px">';
      html += '<div style="font-weight:bold; margin-bottom:16px">Campañas (' + data.campaigns.length + ')</div>';
      data.campaigns.forEach(c => {
        let cls = data.selected?.id === c.id ? 'background:#dbeafe; border-left:4px solid #2563eb' : '';
        html += '<button onclick="pick(\'' + c.id + '\')" style="width:100%; text-align:left; padding:12px; border:0; border-bottom:1px solid #f3f4f6; cursor:pointer; ' + cls + '">';
        html += '<div style="font-weight:600; font-size:14px">' + c.name + '</div>';
        html += '<div style="font-size:12px; color:#666; margin-top:4px">Status: <span style="font-weight:bold; color:' + (c.status === 'draft' ? '#ca8a04' : '#16a34a') + '">' + c.status + '</span></div>';
        html += '<div style="font-size:12px; color:#999">Contactos: ' + c.recipient_count + '</div>';
        html += '</button>';
      });
      html += '</div>';

      html += '<div>';
      if (!data.selected) {
        html += '<div style="background:white; border:1px solid #e5e7eb; border-radius:8px; padding:24px; text-align:center; color:#999">Selecciona una campaña</div>';
      } else {
        html += '<div style="background:white; border:1px solid #e5e7eb; border-radius:8px; padding:24px">';
        html += '<h2 style="font-size:24px; font-weight:bold; margin-bottom:16px">' + data.selected.name + '</h2>';
        html += '<div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; margin-bottom:16px">';
        html += '<div style="background:#f9fafb; padding:12px; border-radius:4px; text-align:center"><p style="font-size:12px; color:#666">Total</p><p style="font-size:20px; font-weight:bold">' + data.selected.recipient_count + '</p></div>';
        html += '<div style="background:#f9fafb; padding:12px; border-radius:4px; text-align:center"><p style="font-size:12px; color:#666">Status</p><p style="font-weight:bold; color:' + (data.selected.status === 'draft' ? '#ca8a04' : '#16a34a') + '">' + data.selected.status + '</p></div>';
        html += '<div style="background:#f9fafb; padding:12px; border-radius:4px; text-align:center"><p style="font-size:12px; color:#666">Creado</p><p style="font-size:12px; font-weight:bold">' + new Date(data.selected.created_at).toLocaleDateString('es-CL') + '</p></div>';
        html += '<div style="background:#f9fafb; padding:12px; border-radius:4px; text-align:center"><p style="font-size:12px; color:#666">Fuente</p><p style="font-size:12px; font-weight:bold">∞ Box</p></div>';
        html += '</div>';

        html += '<div style="background:#f9fafb; padding:16px; border-radius:4px; margin-bottom:16px">';
        html += '<p style="font-size:12px; font-weight:600; color:#666; margin-bottom:4px">📧 Asunto</p>';
        html += '<p style="font-size:14px; margin-bottom:12px">' + (data.selected.subject || 'Sin asunto') + '</p>';
        html += '<p style="font-size:12px; font-weight:600; color:#666; margin-bottom:4px">📝 Mensaje</p>';
        html += '<p style="font-size:13px; color:#374151; white-space:pre-wrap; max-height:120px; overflow-y:auto">' + (data.selected.body || 'Sin contenido') + '</p>';
        html += '</div>';

        if (data.selected.status === 'draft') {
          html += '<button onclick="ok(\'' + data.selected.id + '\')" style="width:100%; background:#16a34a; color:white; padding:12px; border-radius:4px; font-weight:600; border:0; cursor:pointer; margin-bottom:16px">✅ APROBAR CAMPAÑA</button>';
        } else {
          html += '<div style="width:100%; background:#dcfce7; color:#166534; padding:12px; border-radius:4px; text-align:center; font-weight:600; margin-bottom:16px">✅ YA APROBADA</div>';
        }

        html += '<div style="border-top:1px solid #e5e7eb; padding-top:16px">';
        html += '<h3 style="font-weight:600; margin-bottom:12px">👥 Destinatarios</h3>';
        html += '<div id="recips" style="max-height:200px; overflow-y:auto"><p style="font-size:12px; color:#999">Cargando...</p></div>';
        html += '</div>';
        html += '</div>';
      }
      html += '</div></div>';

      document.getElementById('app').innerHTML = html;
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
